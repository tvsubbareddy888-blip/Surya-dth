<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya DTH – Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@300;400;600;700&family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6B00;--gold:#FFD166;--dark:#0D0D1A;--card:#13131F;
  --border:rgba(255,255,255,0.08);--text:#F0EEE8;--muted:#8888AA;
  --green:#06D6A0;--red:#EF233C;
}
body{font-family:'Noto Sans Telugu',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(255,107,0,0.12) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 90%,rgba(255,209,102,0.07) 0%,transparent 60%);pointer-events:none;}

.wrap{width:100%;max-width:480px;position:relative;z-index:1;animation:up .6s cubic-bezier(.22,1,.36,1) both;}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.brand{text-align:center;margin-bottom:24px;}
.brand-icon{font-size:40px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(255,107,0,0.8));}
.brand-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,#FF6B00,#FFD166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-family:'DM Mono',monospace;}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,0.5),rgba(255,209,102,0.4),transparent);}

.section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-family:'DM Mono',monospace;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,107,0,0.3),transparent);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.field input,.field select{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--text);font-family:'Noto Sans Telugu',sans-serif;outline:none;transition:all .2s;width:100%;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:rgba(255,107,0,0.5);background:rgba(255,107,0,0.05);box-shadow:0 0 0 3px rgba(255,107,0,0.08);}
.field input::placeholder{color:var(--muted);opacity:.7;}
.select-wrap{position:relative;}
.select-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:11px;}
.field select option{background:#1A1A2E;}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0;}

.amount-wrap{position:relative;}
.amount-wrap .rs{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--orange);font-weight:700;font-size:18px;}
.amount-wrap input{padding-left:28px!important;font-size:22px!important;font-weight:700;color:var(--gold)!important;font-family:'DM Mono',monospace!important;}

.pay-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF6B00,#FF9A3C);color:white;font-size:16px;font-weight:700;font-family:'Syne','Noto Sans Telugu',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(255,107,0,0.3);margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;}
.pay-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(255,107,0,0.45);}
.pay-btn:disabled{background:linear-gradient(135deg,#555,#666);cursor:not-allowed;transform:none;box-shadow:none;}

.status{display:none;margin-top:14px;padding:14px 16px;border-radius:10px;font-size:13px;font-weight:600;align-items:center;gap:10px;}
.status.loading{background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.2);color:var(--gold);display:flex;}
.status.error{background:rgba(239,35,60,0.1);border:1px solid rgba(239,35,60,0.2);color:var(--red);display:block;}

.spinner{width:16px;height:16px;border:2px solid rgba(255,209,102,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

.badges{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap;}
.badge{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(6,214,160,0.8);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:420px){.grid{grid-template-columns:1fr;}.field.full{grid-column:1;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="brand-icon">🌟</span>
    <div class="brand-name">Surya DTH</div>
    <div class="brand-sub">Secure Payment</div>
  </div>

  <div class="card">
    <div class="section-label">📋 వివరాలు</div>
    <div class="grid">
      <div class="field">
        <label>టెక్నీషియన్</label>
        <div class="select-wrap">
          <select id="tech">
            <option value="Mahesh">Mahesh</option>
            <option value="Ramanji">Ramanji</option>
            <option value="Viswanath">Viswanath</option>
            <option value="Mohan">Mohan</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>విలేజ్</label>
        <input type="text" id="village" placeholder="విలేజ్ పేరు">
      </div>
      <div class="field full">
        <label>కస్టమర్ పేరు</label>
        <input type="text" id="customer" placeholder="పూర్తి పేరు" required>
      </div>
      <div class="field">
        <label>మొబైల్</label>
        <input type="tel" id="mobile" placeholder="10 అంకెలు" maxlength="10" required>
      </div>
      <div class="field">
        <label>VC / CDSN</label>
        <input type="text" id="vccdsn" placeholder="నంబర్">
      </div>
      <div class="field full">
        <label>సర్వీస్</label>
        <div class="select-wrap">
          <select id="service">
            <option value="New Connection">New Connection</option>
            <option value="Recharge">Recharge</option>
            <option value="Repair">Repair</option>
            <option value="New Box">New Box</option>
          </select>
        </div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-label">💰 మొత్తం</div>
    <div class="field">
      <div class="amount-wrap">
        <span class="rs">₹</span>
        <input type="number" id="amount" placeholder="0" required>
      </div>
    </div>

    <button class="pay-btn" id="payBtn" onclick="startPayment()">
      🔒 Secure Pay చేయండి
    </button>

    <div class="status" id="statusBox">
      <div class="spinner"></div>
      <span id="statusText">కనెక్ట్ అవుతోంది...</span>
    </div>
  </div>

  <div class="badges">
    <div class="badge"><div class="dot"></div> SSL Secured</div>
    <div class="badge"><div class="dot"></div> Cashfree PG</div>
    <div class="badge"><div class="dot"></div> PCI DSS</div>
  </div>
</div>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzloX1S2IguQZFWNrrIPdaBnvSTHvohFYx0NS1i5byfUJIaOF4vRCKi0aQSeQKNSybz/exec";
let cashfree = null;
window.addEventListener("load", () => {
  if (typeof Cashfree !== "undefined") cashfree = Cashfree({ mode: "production" });
});

function showStatus(type, text) {
  const box = document.getElementById('statusBox');
  const txt = document.getElementById('statusText');
  box.className = 'status ' + type;
  box.style.display = type === 'loading' ? 'flex' : 'block';
  txt.textContent = text;
}

function resetBtn() {
  const btn = document.getElementById('payBtn');
  btn.disabled = false;
  btn.textContent = '🔒 Secure Pay చేయండి';
  document.getElementById('statusBox').style.display = 'none';
}

function startPayment() {
  const customer = document.getElementById('customer').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const amount = document.getElementById('amount').value.trim();
  const tech = document.getElementById('tech').value;
  const village = document.getElementById('village').value.trim();
  const vccdsn = document.getElementById('vccdsn').value.trim();
  const service = document.getElementById('service').value;

  if (!customer || !mobile || !amount) {
    showStatus('error', '⚠️ పేరు, మొబైల్, మొత్తం తప్పనిసరి!');
    return;
  }
  if (mobile.length !== 10) {
    showStatus('error', '⚠️ 10 అంకెల మొబైల్ నంబర్ రాయండి!');
    return;
  }
  if (!cashfree) {
    showStatus('error', '⚠️ Page refresh చేసి మళ్ళీ try చేయండి!');
    return;
  }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Processing...';
  showStatus('loading', 'Cashfree తో కనెక్ట్ అవుతోంది...');

  const params = new URLSearchParams({ tech, village, customer, mobile, vccdsn, service, amount });

  fetch(`${SCRIPT_URL}?${params.toString()}`)
    .then(r => r.json())
    .then(res => {
      if (res.error) { showStatus('error', '❌ Error: ' + res.error); resetBtn(); return; }
      if (!res.payment_session_id) { showStatus('error', '❌ Payment session రాలేదు!'); resetBtn(); return; }

      showStatus('loading', '⏳ Payment page తెరుచుకుంటోంది...');

      cashfree.checkout({
        paymentSessionId: res.payment_session_id,
        redirectTarget: "_self"
      });
    })
    .catch(err => {
      showStatus('error', '❌ కనెక్షన్ ఫెయిల్! Internet చెక్ చేయండి.');
      resetBtn();
    });
}
</script>
</body>
</html>
