<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya DTH – Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@300;400;600;700&family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#FF6B00;--gold:#FFD166;--dark:#0D0D1A;--card:#13131F;--border:rgba(255,255,255,0.08);--text:#F0EEE8;--muted:#8888AA;--green:#06D6A0;--red:#EF233C;}
body{font-family:'Noto Sans Telugu',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(255,107,0,0.12) 0%,transparent 70%);pointer-events:none;}
.wrap{width:100%;max-width:480px;position:relative;z-index:1;animation:up .6s cubic-bezier(.22,1,.36,1) both;}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:24px;}
.brand-icon{font-size:40px;display:block;margin-bottom:8px;}
.brand-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,#FF6B00,#FFD166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,0.5),rgba(255,209,102,0.4),transparent);}
.vc-display{background:rgba(255,107,0,0.06);border:1px solid rgba(255,107,0,0.2);border-radius:10px;padding:12px 16px;margin-bottom:16px;}
.vc-label{font-size:10px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:4px;}
.vc-number{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--gold);}
.vc-name{font-size:12px;color:var(--muted);margin-top:2px;}
.section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-family:'DM Mono',monospace;margin-bottom:12px;}
.amount-wrap{position:relative;margin-bottom:8px;}
.amount-wrap .rs{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--orange);font-weight:700;font-size:18px;}
.amount-wrap input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:14px 13px 14px 32px;font-size:28px;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace;width:100%;outline:none;}
.amount-wrap input:focus{border-color:rgba(255,107,0,0.5);}
.amount-wrap input::placeholder{color:var(--muted);opacity:.5;}
.quick-amounts{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.qa-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;}
.qa-btn:hover,.qa-btn.active{background:rgba(255,107,0,0.1);border-color:rgba(255,107,0,0.3);color:var(--orange);}
.pay-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF6B00,#FF9A3C);color:white;font-size:16px;font-weight:700;font-family:'Syne','Noto Sans Telugu',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(255,107,0,0.3);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px;}
.pay-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(255,107,0,0.45);}
.pay-btn:disabled{background:linear-gradient(135deg,#555,#666);cursor:not-allowed;transform:none;box-shadow:none;}
.status{display:none;margin-top:14px;padding:14px 16px;border-radius:10px;font-size:13px;font-weight:600;}
.status.loading{background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.2);color:var(--gold);display:flex;align-items:center;gap:10px;}
.status.error{background:rgba(239,35,60,0.1);border:1px solid rgba(239,35,60,0.2);color:var(--red);display:block;}
.status.success{background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.2);color:var(--green);display:block;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,209,102,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.badges{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap;}
.badge{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(6,214,160,0.8);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="brand-icon">📡</span>
    <div class="brand-name">Surya DTH</div>
    <div class="brand-sub">Secure Payment</div>
  </div>

  <div class="card">
    <div class="vc-display" id="vcDisplay" style="display:none;">
      <div class="vc-label">VC Number</div>
      <div class="vc-number" id="vcNumber">–</div>
      <div class="vc-name" id="vcCustName"></div>
    </div>

    <div class="section-label">💰 Amount Enter చేయండి</div>
    
    <div class="amount-wrap">
      <span class="rs">₹</span>
      <input type="number" id="amount" placeholder="250" min="200" oninput="updateQuickAmounts()">
    </div>

    <div class="quick-amounts">
      <button class="qa-btn" onclick="setAmount(250)">₹250</button>
      <button class="qa-btn" onclick="setAmount(267)">₹267</button>
      <button class="qa-btn" onclick="setAmount(500)">₹500</button>
      <button class="qa-btn" onclick="setAmount(534)">₹534</button>
      <button class="qa-btn" onclick="setAmount(750)">₹750</button>
      <button class="qa-btn" onclick="setAmount(801)">₹801</button>
    </div>

    <button class="pay-btn" id="payBtn" onclick="startPayment()">
      🔒 Pay చేయండి
    </button>
    <div class="status" id="statusBox">
      <div class="spinner"></div>
      <span id="statusText">Processing...</span>
    </div>
  </div>

  <div class="badges">
    <div class="badge"><div class="dot"></div> SSL Secured</div>
    <div class="badge"><div class="dot"></div> Cashfree PG</div>
    <div class="badge"><div class="dot"></div> PCI DSS</div>
  </div>
</div>

<script>
const RENDER_URL = 'https://surya-dth.onrender.com';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzEQGglXH1zST1ZsyLo3iVCc-xmwQ3xf_doSr-dZhvd0HSfDATuQpg4Paf0nA2cTLCt/exec';

// URL params
const urlParams = new URLSearchParams(window.location.search);
const vcNo = urlParams.get('vc') || '';
const customerName = urlParams.get('customer') || 'Customer';
const customerPhone = urlParams.get('mobile') || '9999999999';
const techName = urlParams.get('tech') || '';
const pct = parseFloat(urlParams.get('pct') || '70.8');

// VC display
if (vcNo) {
  document.getElementById('vcDisplay').style.display = 'block';
  document.getElementById('vcNumber').textContent = vcNo;
  if(customerName && customerName !== 'Customer') {
    document.getElementById('vcCustName').textContent = customerName;
  }
}

function setAmount(amt) {
  document.getElementById('amount').value = amt;
  document.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function updateQuickAmounts() {
  document.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('active'));
}

function showStatus(type, text) {
  const box = document.getElementById('statusBox');
  box.className = 'status ' + type;
  box.style.display = type === 'loading' ? 'flex' : 'block';
  document.getElementById('statusText').textContent = text;
}

async function startPayment() {
  const amount = parseFloat(document.getElementById('amount').value);
  
  if (!amount || amount < 200) {
    showStatus('error', '⚠️ Minimum ₹200 enter చేయండి!');
    return;
  }
  
  if (!vcNo) {
    showStatus('error', '⚠️ VC number లేదు! QR code scan చేయండి.');
    return;
  }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Processing...';
  showStatus('loading', 'Payment link create అవుతుంది...');

  try {
    // Recharge amount — percentage based
    const rechargeAmt = Math.floor(amount * pct / 100);
    
    // Step 1: Cashfree link create
    const resp = await fetch(RENDER_URL + '/create-link', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        vc: vcNo,
        amount: amount,
        customer_name: customerName,
        customer_phone: customerPhone,
        pack_label: 'Recharge',
        recharge_amount: rechargeAmt,
        months: 1,
        tech: techName
      })
    });

    const data = await resp.json();
    
    if (data.success && data.link_url) {
      // Step 2: Sheet లో record save
      const orderId = data.link_id || ('VC-'+vcNo+'-'+Date.now());
      fetch(SHEET_URL + '?action=save'
        + '&tech=' + encodeURIComponent(techName)
        + '&customer=' + encodeURIComponent(customerName)
        + '&mobile=' + encodeURIComponent(customerPhone)
        + '&village='
        + '&vccdsn=' + encodeURIComponent(vcNo)
        + '&service=Recharge'
        + '&amount=' + amount
        + '&order_id=' + encodeURIComponent(orderId)
      ).catch(err => console.log('Sheet save error:', err));

      showStatus('loading', 'Payment page తెరుచుకుంటుంది...');
      // Step 3: Payment page redirect
      setTimeout(() => { window.location.href = data.link_url; }, 500);
    } else {
      showStatus('error', '❌ Error: ' + (data.error || 'Try again'));
      btn.disabled = false;
      btn.innerHTML = '🔒 Pay చేయండి';
    }
  } catch(err) {
    showStatus('error', '❌ Connection failed! Try again.');
    btn.disabled = false;
    btn.innerHTML = '🔒 Pay చేయండి';
  }
}
</script>
</body>
</html>
