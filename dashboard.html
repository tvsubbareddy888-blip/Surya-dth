<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya DTH – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#FF6B00;--gold:#FFD166;--dark:#0D0D1A;--card:#13131F;--border:rgba(255,255,255,0.08);--text:#F0EEE8;--muted:#8888AA;--green:#06D6A0;--red:#EF233C;}
body{font-family:'Noto Sans Telugu',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding:16px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(255,107,0,0.08) 0%,transparent 70%);pointer-events:none;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;position:relative;z-index:1;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#FF6B00,#FFD166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase;}
.refresh-btn{background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:var(--orange);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;}
.refresh-btn:hover{background:rgba(255,107,0,0.2);}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;position:relative;z-index:1;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat.total::before{background:linear-gradient(90deg,var(--orange),var(--gold));}
.stat.success::before{background:linear-gradient(90deg,var(--green),#00B4D8);}
.stat.failed::before{background:linear-gradient(90deg,var(--red),#F72585);}
.stat.amount::before{background:linear-gradient(90deg,var(--gold),var(--orange));}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:8px;}
.stat-value{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;}
.stat.total .stat-value{color:var(--orange);}
.stat.success .stat-value{color:var(--green);}
.stat.failed .stat-value{color:var(--red);}
.stat.amount .stat-value{color:var(--gold);font-size:20px;}
.filter-row{display:flex;gap:8px;margin-bottom:16px;position:relative;z-index:1;overflow-x:auto;padding-bottom:4px;}
.filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;white-space:nowrap;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:rgba(255,107,0,0.1);border-color:rgba(255,107,0,0.3);color:var(--orange);}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;z-index:1;}
.table-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:11px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.payment-list{max-height:65vh;overflow-y:auto;}
.payment-item{padding:14px 16px;border-bottom:1px solid var(--border);transition:background .15s;}
.payment-item:last-child{border-bottom:none;}
.payment-item:hover{background:rgba(255,255,255,0.02);}
.item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.customer-name{font-size:14px;font-weight:600;}
.amount-badge{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--gold);}
.item-mid{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.tech-tag{background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.2);color:var(--orange);padding:2px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace;}
.service-tag{background:rgba(255,255,255,0.05);color:var(--muted);padding:2px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace;}
.status-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace;font-weight:700;}
.status-badge.SUCCESS{background:rgba(6,214,160,0.1);color:var(--green);border:1px solid rgba(6,214,160,0.2);}
.status-badge.INITIATED{background:rgba(255,209,102,0.1);color:var(--gold);border:1px solid rgba(255,209,102,0.2);}
.status-badge.PAYMENTSUCCESS{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);}
.status-badge.FAILED{background:rgba(239,35,60,0.1);color:var(--red);border:1px solid rgba(239,35,60,0.2);}
.status-badge.RECHARGED{background:rgba(6,214,160,0.15);color:var(--green);border:1px solid rgba(6,214,160,0.3);}
.status-badge.MANUALRECHARGED{background:rgba(16,185,129,0.2);color:#34d399;border:1px solid rgba(16,185,129,0.4);}
.manual-btn{background:#10b981;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.manual-btn:hover{background:#059669;}
.failed-alert{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.item-bot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.mobile-num{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.date-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
/* Recharge button */
/* EP Settings */
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#13131F;border:1px solid rgba(255,255,255,0.08);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:440px;}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.modal input{width:100%;background:#0D0D1A;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#F0EEE8;font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:8px;}
.modal input:focus{border-color:var(--orange);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;}
.btn-save{background:var(--orange);color:#000;}
.btn-cancel{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.08);}
/* Recharge progress modal */
.rch-result{border-radius:10px;padding:14px;text-align:center;margin-top:10px;}
.rch-result.success{background:rgba(6,214,160,0.08);border:1px solid rgba(6,214,160,0.2);}
.rch-result.fail{background:rgba(239,35,60,0.08);border:1px solid rgba(239,35,60,0.2);}
.empty{text-align:center;padding:40px;color:var(--muted);}
.empty-icon{font-size:32px;display:block;margin-bottom:10px;}
.loading-box{text-align:center;padding:30px;color:var(--muted);}
.spinner{width:20px;height:20px;border:2px solid rgba(255,107,0,0.2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,107,0,0.3);border-radius:4px;}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div>
      <div class="brand-name">🌟 Surya DTH</div>
      <div class="brand-sub">Owner Dashboard</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
</div>

<!-- FAILED ALERT -->
<div class="failed-alert" id="failedAlert">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:24px;">🚨</span>
    <div>
      <div style="font-size:14px;font-weight:800;color:var(--red);">Recharge Failed!</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;" id="failedAlertMsg">Payment అయింది కానీ recharge fail అయింది — manually recharge చేయండి!</div>
    </div>
    <button onclick="document.getElementById('failedAlert').style.display='none'" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
  </div>
</div>

<div class="stats">
  <div class="stat total"><div class="stat-label">Total</div><div class="stat-value" id="totalCount">–</div></div>
  <div class="stat amount"><div class="stat-label">Amount</div><div class="stat-value" id="totalAmount">–</div></div>
  <div class="stat success"><div class="stat-label">Success</div><div class="stat-value" id="successCount">–</div></div>
  <div class="stat failed"><div class="stat-label">Pending</div><div class="stat-value" id="failedCount">–</div></div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="filterData('ALL',this)">అన్నీ</button>
  <button class="filter-btn" onclick="filterData('SUCCESS',this)">✅ Success</button>
  <button class="filter-btn" onclick="filterData('INITIATED',this)">⏳ Pending</button>
  <button class="filter-btn" onclick="filterData('Mahesh',this)">Mahesh</button>
  <button class="filter-btn" onclick="filterData('Ramanji',this)">Ramanji</button>
  <button class="filter-btn" onclick="filterData('Viswanath',this)">Viswanath</button>
  <button class="filter-btn" onclick="filterData('Mohan',this)">Mohan</button>
</div>

<div class="table-wrap">
  <div class="table-header">
    <span class="table-title">📊 Payment Records</span>
    <span class="count" id="recordCount">Loading...</span>
  </div>
  <div class="payment-list" id="paymentList">
    <div class="loading-box"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<script>
const SHEET_URL="https://script.google.com/macros/s/AKfycbwo5Bxopiw9aGqUNoT56aFhuwGLIfUnVvlKQfIhwEyyibOD1bbCpaEYY3OUyxcU9_I/exec";
let allData=[], currentFilter='ALL';

// ── DATA ──
function loadData(){
  document.getElementById('paymentList').innerHTML='<div class="loading-box"><div class="spinner"></div>Loading...</div>';
  document.getElementById('recordCount').textContent='Loading...';
  fetch(`${SHEET_URL}?action=getdata`)
    .then(r=>r.json())
    .then(res=>{
      if(res.data){allData=res.data.reverse();updateStats();renderList(allData);}
      else showEmpty('Data రాలేదు!');
    })
    .catch(()=>showEmpty('❌ Connection ఫెయిల్!'));
}

function updateStats(){
  const recharged=allData.filter(r=>r.status==='RECHARGED');
  const failed=allData.filter(r=>(r.status||'').startsWith('PAID-RECHARGE FAILED'));
  const pending=allData.filter(r=>r.status==='INITIATED'||r.status==='PAYMENT_SUCCESS');
  const totalAmt=recharged.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  document.getElementById('totalCount').textContent=allData.length;
  document.getElementById('successCount').textContent=recharged.length;
  document.getElementById('failedCount').textContent=pending.length+failed.length;
  document.getElementById('totalAmount').textContent='₹'+totalAmt.toLocaleString('en-IN');
}

function filterData(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let filtered=allData;
  if(filter==='SUCCESS') filtered=allData.filter(r=>r.status==='RECHARGED');
  else if(filter==='INITIATED') filtered=allData.filter(r=>r.status==='INITIATED'||r.status==='PAYMENT_SUCCESS'||(r.status||'').startsWith('PAID-RECHARGE FAILED'));
  else if(filter!=='ALL') filtered=allData.filter(r=>r.tech===filter);
  renderList(filtered);
}

function statusClass(status){
  status=status||'INITIATED';
  if(status==='RECHARGED') return 'RECHARGED';
  if(status==='MANUALLY RECHARGED') return 'MANUALRECHARGED';
  if(status==='PAYMENT_SUCCESS') return 'PAYMENTSUCCESS';
  if(status.startsWith('PAID-RECHARGE FAILED')) return 'FAILED';
  return 'INITIATED';
}

function renderList(data){
  document.getElementById('recordCount').textContent=data.length+' records';
  if(!data.length){showEmpty('Records లేవు');return;}
  document.getElementById('paymentList').innerHTML=data.map(r=>{
    const status=r.status||'INITIATED';
    const isFailed=status.startsWith('PAID-RECHARGE FAILED');
    const safeOrderId=(r.order_id||'').replace(/'/g,'&#39;');
    const safeCustName=(r.customer||'').replace(/'/g,'&#39;');
    const manualBtn=isFailed?'<button class="manual-btn" onclick="markManualRecharge(''+safeOrderId+'',''+safeCustName+'')">✅ Manual Done</button>':'';
    return`<div class="payment-item" style="${isFailed?'border-left:3px solid var(--red);':''}">
      <div class="item-top">
        <span class="customer-name">${r.customer||'–'}</span>
        <span class="amount-badge">₹${parseFloat(r.amount||0).toLocaleString('en-IN')}</span>
      </div>
      <div class="item-mid">
        <span class="tech-tag">${r.tech||'–'}</span>
        <span class="service-tag">${r.service||'–'}</span>
        <span class="status-badge ${statusClass(status)}" title="${status}">${status.length>28?status.substring(0,28)+'…':status}</span>
        ${r.village?`<span class="service-tag">📍${r.village}</span>`:''}
        ${r.vccdsn?`<span class="service-tag">VC:${r.vccdsn}</span>`:''}
      </div>
      <div class="item-bot">
        <span class="mobile-num">📱 ${r.mobile||'–'}</span>
        <span class="date-time">${r.date?new Date(r.date).toLocaleDateString('en-IN'):'–'}</span>
        ${manualBtn}
      </div>
    </div>`;
  }).join('');
}

function showEmpty(msg){
  document.getElementById('paymentList').innerHTML=`<div class="empty"><span class="empty-icon">📭</span>${msg}</div>`;
  document.getElementById('recordCount').textContent='0 records';
}

// ── FAILED ALERT ──
let alertSound = null;
let previousFailedCount = 0;

function checkFailedAlert(){
  const failed=allData.filter(r=>(r.status||'').startsWith('PAID-RECHARGE FAILED'));
  const alertEl=document.getElementById('failedAlert');
  const alertMsg=document.getElementById('failedAlertMsg');

  if(failed.length > previousFailedCount){
    // కొత్త failure వచ్చింది — alert చూపించు + sound play చేయి
    alertEl.style.display='block';
    const newFailed=failed[0];
    alertMsg.textContent='⚠️ '+(newFailed.customer||'Customer')+' (VC:'+(newFailed.vccdsn||'')+')'
      +' — Payment అయింది కానీ recharge fail అయింది! Manual recharge చేయండి!';
    playAlert();
  }
  previousFailedCount=failed.length;
}

function playAlert(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const playBeep=(freq,start,dur)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;
      g.gain.setValueAtTime(0.3,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);
      o.stop(ctx.currentTime+start+dur);
    };
    playBeep(880,0,0.2);
    playBeep(660,0.25,0.2);
    playBeep(880,0.5,0.3);
  }catch(e){console.log('Audio error:',e);}
}

// ── MANUAL RECHARGE MARK ──
async function markManualRecharge(orderId, customerName){
  if(!orderId){alert('Order ID లేదు!');return;}
  const confirm_=window.confirm('✅ '+customerName+' కి manually recharge చేశారా?

OK నొక్కితే "MANUALLY RECHARGED" గా mark అవుతుంది.');
  if(!confirm_) return;
  try{
    const res=await fetch(SHEET_URL+'?action=updatestatus&order_id='+encodeURIComponent(orderId)+'&status=MANUALLY RECHARGED');
    const data=await res.json();
    if(data.status==='updated'){
      showToast('✅ Manually Recharged గా mark అయింది!');
      loadData();
    } else {
      alert('Update fail అయింది! Sheet లో manually మార్చండి.');
    }
  }catch(e){
    alert('Error: '+e.message);
  }
}

function showToast(msg){
  let t=document.getElementById('dashToast');
  if(!t){t=document.createElement('div');t.id='dashToast';
    t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-family:DM Mono,monospace;z-index:9999;';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>{t.style.display='none';},3000);
}

// Init
loadData();
setInterval(()=>{loadData();checkFailedAlert();},30000);
</script>
</body>
</html>
