<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surya DTH – Secure Payment</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@300;400;600;700&family=Syne:wght@400;700;800&family=DM+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --sun: #FF6B00;
      --sun-glow: #FF9A3C;
      --deep: #0D0D1A;
      --card: #13131F;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text: #F0EEE8;
      --muted: #8888AA;
      --accent: #FFD166;
      --success: #06D6A0;
      --error: #EF233C;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Telugu', 'Syne', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(255,107,0,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 90%, rgba(255,209,102,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 50% 50%, rgba(13,13,26,0) 0%, #0D0D1A 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Orbiting sun rings */
    .sun-ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(255,107,0,0.08);
      pointer-events: none;
      z-index: 0;
      animation: rotate linear infinite;
    }
    .sun-ring:nth-child(1) { width: 400px; height: 400px; top: -150px; right: -100px; animation-duration: 30s; }
    .sun-ring:nth-child(2) { width: 600px; height: 600px; top: -250px; right: -200px; animation-duration: 45s; border-color: rgba(255,209,102,0.05); animation-direction: reverse; }
    .sun-ring:nth-child(3) { width: 800px; height: 800px; top: -350px; right: -300px; animation-duration: 60s; }

    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header brand */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .sun-icon {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .sun-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(255,107,0,0.8));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(255,107,0,0.8)); }
      50% { filter: drop-shadow(0 0 20px rgba(255,154,60,1)); }
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #FF6B00, #FFD166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,107,0,0.5), rgba(255,209,102,0.4), transparent);
    }

    .card-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--sun);
      font-family: 'DM Mono', monospace;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,107,0,0.3), transparent);
    }

    /* Field groups */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field-grid .field-full {
      grid-column: 1 / -1;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .field input,
    .field select {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Noto Sans Telugu', sans-serif;
      outline: none;
      transition: all 0.25s ease;
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
    }

    .field input::placeholder { color: var(--muted); opacity: 0.7; }

    .field input:focus,
    .field select:focus {
      border-color: rgba(255,107,0,0.5);
      background: rgba(255,107,0,0.05);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.08);
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    .field select option {
      background: #1A1A2E;
      color: var(--text);
    }

    /* Amount field special */
    .amount-field {
      position: relative;
    }

    .amount-field .rupee {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--sun);
      font-weight: 700;
      font-size: 16px;
    }

    .amount-field input {
      padding-left: 30px !important;
      font-size: 20px !important;
      font-weight: 700;
      color: var(--accent) !important;
      font-family: 'DM Mono', monospace !important;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 20px 0;
    }

    /* Pay button */
    .pay-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #FF6B00, #FF9A3C);
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Syne', 'Noto Sans Telugu', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      margin-top: 4px;
      box-shadow: 0 4px 20px rgba(255,107,0,0.3);
    }

    .pay-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .pay-btn:hover::before { opacity: 1; }
    .pay-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(255,107,0,0.45); }
    .pay-btn:active { transform: translateY(0); }

    .pay-btn:disabled {
      background: linear-gradient(135deg, #555, #666);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Lock icon in button */
    .lock-icon { font-size: 14px; }

    /* Status message */
    .status-box {
      display: none;
      margin-top: 16px;
      padding: 16px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .status-loading {
      background: rgba(255,209,102,0.1);
      border: 1px solid rgba(255,209,102,0.2);
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-success {
      background: rgba(6,214,160,0.1);
      border: 1px solid rgba(6,214,160,0.2);
      color: var(--success);
    }

    .status-error {
      background: rgba(239,35,60,0.1);
      border: 1px solid rgba(239,35,60,0.2);
      color: var(--error);
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,209,102,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer security badges */
    .security-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px rgba(6,214,160,0.8);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .field-grid { grid-template-columns: 1fr; }
      .field-grid .field-full { grid-column: 1; }
      .brand-name { font-size: 24px; }
    }
  </style>
</head>
<body>

<!-- Background rings -->
<div class="sun-ring"></div>
<div class="sun-ring"></div>
<div class="sun-ring"></div>

<div class="wrapper">

  <!-- Brand header -->
  <div class="brand">
    <div class="brand-logo">
      <div class="sun-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="10" fill="#FF6B00"/>
          <g stroke="#FFD166" stroke-width="2" stroke-linecap="round">
            <line x1="24" y1="4" x2="24" y2="10"/>
            <line x1="24" y1="38" x2="24" y2="44"/>
            <line x1="4" y1="24" x2="10" y2="24"/>
            <line x1="38" y1="24" x2="44" y2="24"/>
            <line x1="8.69" y1="8.69" x2="13.17" y2="13.17"/>
            <line x1="34.83" y1="34.83" x2="39.31" y2="39.31"/>
            <line x1="39.31" y1="8.69" x2="34.83" y2="13.17"/>
            <line x1="13.17" y1="34.83" x2="8.69" y2="39.31"/>
          </g>
          <circle cx="24" cy="24" r="6" fill="#FFD166"/>
        </svg>
      </div>
      <span class="brand-name">Surya DTH</span>
    </div>
    <div class="brand-tagline">Secure Payment Gateway</div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="card-title">📋 పేమెంట్ వివరాలు</div>

    <div class="field-grid">

      <!-- Technician -->
      <div class="field">
        <label>టెక్నీషియన్</label>
        <div class="select-wrap">
          <select id="tech" name="tech">
            <option value="Mahesh">Mahesh</option>
            <option value="Ramanji">Ramanji</option>
            <option value="Viswam">Viswam</option>
            <option value="Mohan">Mohan</option>
          </select>
        </div>
      </div>

      <!-- Village -->
      <div class="field">
        <label>విలేజ్</label>
        <input type="text" id="village" name="village" placeholder="విలేజ్ పేరు">
      </div>

      <!-- Customer name -->
      <div class="field field-full">
        <label>కస్టమర్ పేరు</label>
        <input type="text" id="customer" name="customer" placeholder="పూర్తి పేరు రాయండి" required>
      </div>

      <!-- Mobile -->
      <div class="field">
        <label>మొబైల్ నంబర్</label>
        <input type="tel" id="mobile" name="mobile" placeholder="10 అంకెలు" maxlength="10" required>
      </div>

      <!-- VC / CDSN -->
      <div class="field">
        <label>VC / CDSN నంబర్</label>
        <input type="text" id="vccdsn" name="vccdsn" placeholder="VC లేదా CDSN">
      </div>

      <!-- Service -->
      <div class="field field-full">
        <label>సర్వీస్ రకం</label>
        <input type="text" id="service" name="service" placeholder="Recharge / New Connection / Repair">
      </div>

    </div>

    <div class="divider"></div>

    <div class="card-title">💰 మొత్తం</div>

    <div class="field">
      <div class="amount-field">
        <span class="rupee">₹</span>
        <input type="number" id="amount" name="amount" placeholder="0" required>
      </div>
    </div>

    <div style="height:16px;"></div>

    <!-- Pay button -->
    <button class="pay-btn" id="payBtn" onclick="startLivePayment()">
      <div class="btn-inner">
        <span class="lock-icon">🔒</span>
        <span>Secure Pay చేయండి</span>
      </div>
    </button>

    <!-- Status box -->
    <div class="status-box" id="statusBox">
      <div class="spinner"></div>
      <span id="statusText"></span>
    </div>

  </div>

  <!-- Security row -->
  <div class="security-row">
    <div class="badge"><div class="badge-dot"></div> SSL Secured</div>
    <div class="badge"><div class="badge-dot"></div> Cashfree PG</div>
    <div class="badge"><div class="badge-dot"></div> PCI DSS</div>
  </div>

</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNoPGRNRsMEy68N_zEmVetow4rZDG-U0qNcpyno3xp6EAf11mYktZ0HOxwCbDKHiXM/exec";

let cashfree = null;
window.addEventListener("load", function() {
  if (typeof Cashfree !== "undefined") {
    cashfree = Cashfree({ mode: "production" });
  }
});

function showStatus(type, text) {
  const box = document.getElementById('statusBox');
  const statusText = document.getElementById('statusText');
  box.style.display = 'flex';
  box.className = 'status-box status-' + type;
  statusText.textContent = text;
  if (type !== 'loading') {
    box.style.display = 'block';
  }
}

function resetBtn() {
  const btn = document.getElementById('payBtn');
  btn.disabled = false;
  btn.innerHTML = '<div class="btn-inner"><span class="lock-icon">🔒</span><span>Secure Pay చేయండి</span></div>';
  document.getElementById('statusBox').style.display = 'none';
}

function startLivePayment() {
  // Collect fields
  const tech = document.getElementById('tech').value;
  const customer = document.getElementById('customer').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const village = document.getElementById('village').value.trim();
  const vccdsn = document.getElementById('vccdsn').value.trim();
  const service = document.getElementById('service').value.trim();
  const amount = document.getElementById('amount').value.trim();

  if (!customer || !mobile || !amount) {
    showStatus('error', '⚠️ కస్టమర్ పేరు, మొబైల్ నంబర్ మరియు మొత్తం తప్పనిసరి!');
    setTimeout(() => document.getElementById('statusBox').style.display = 'none', 3000);
    return;
  }

  if (mobile.length !== 10) {
    showStatus('error', '⚠️ సరైన 10 అంకెల మొబైల్ నంబర్ రాయండి!');
    setTimeout(() => document.getElementById('statusBox').style.display = 'none', 3000);
    return;
  }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-inner"><div style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;"></div><span>కనెక్ట్ అవుతోంది...</span></div>';

  const box = document.getElementById('statusBox');
  box.style.display = 'flex';
  box.className = 'status-box status-loading';
  box.innerHTML = '<div class="spinner"></div><span>⏳ Cashfree సర్వర్‌తో కనెక్ట్ అవుతోంది...</span>';

  const params = new URLSearchParams({ tech, customer, mobile, village, vccdsn, service, amount });

  fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`, { method: 'POST' })
    .then(r => r.json())
    .then(res => {
      if (!res.payment_session_id) {
        box.style.display = 'block';
        box.className = 'status-box status-error';
        box.textContent = '❌ సెక్యూరిటీ కీ లోపం! Google Script సెట్టింగ్స్ చెక్ చేయండి.';
        resetBtn();
        return;
      }

      box.innerHTML = '<div class="spinner"></div><span>⏳ కస్టమర్ పేమెంట్ పూర్తి చేసే వరకు వేచి ఉండండి...</span>';

      cashfree.checkout({
        checkoutOptions: {
          paymentSessionId: res.payment_session_id,
          returnUrl: window.location.href
        }
      }).then(result => {
        if (result.error) {
          box.style.display = 'block';
          box.className = 'status-box status-error';
          box.textContent = '❌ పేమెంట్ లోపం: ' + result.error.message;
          resetBtn();
        }
      });
    })
    .catch(() => {
      box.style.display = 'block';
      box.className = 'status-box status-error';
      box.textContent = '❌ కనెక్షన్ ఫెయిల్ అయింది! Internet చెక్ చేయండి.';
      resetBtn();
    });
}
</script>
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</body>
</html>
